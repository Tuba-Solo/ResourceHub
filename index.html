<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Dashboard</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Custom scrollbar for the table */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;

        // --- Utility Functions ---

        // Robust CSV Parser
        const parseCSV = (csvText) => {
            const lines = [];
            let currentLine = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    currentField += '"';
                    i++; // skip escaped quote
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentLine.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i++; // skip \n in \r\n
                    currentLine.push(currentField);
                    lines.push(currentLine);
                    currentLine = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            if (currentField || currentLine.length > 0) {
                currentLine.push(currentField);
                lines.push(currentLine);
            }
            return lines;
        };

        // Builds the hierarchical tree structure from parsed CSV rows
        const buildHierarchy = (csvData) => {
            const rows = csvData.slice(1); // Skip header
            const hierarchy = [];
            let currentOI = null;
            let currentGQ = null;

            rows.forEach(row => {
                if (!row || row.length < 2) return;
                const code = row[0] ? row[0].trim() : "";
                const text = row[1] ? row[1].trim() : "";

                if (!code) return;

                // Identify hierarchy level based on code structure
                const isOI = code.startsWith('OI.') && !code.includes('.GQ');
                const isGQ = code.includes('.GQ.') && !code.includes('.LO');
                const isLO = code.includes('.LO.') && !code.includes('.U');

                if (isOI) {
                    currentOI = { code, text, gqs: [] };
                    hierarchy.push(currentOI);
                    currentGQ = null;
                } else if (isGQ && currentOI) {
                    currentGQ = { code, text, los: [] };
                    currentOI.gqs.push(currentGQ);
                } else if (isLO && currentGQ) {
                    currentGQ.los.push({ code, text });
                }
            });

            // Calculate rowSpans for HTML table rendering
            hierarchy.forEach(oi => {
                let oiSpan = 0;
                oi.gqs.forEach(gq => {
                    let gqSpan = gq.los.length > 0 ? gq.los.length : 1;
                    gq.rowSpan = gqSpan;
                    oiSpan += gqSpan;
                });
                oi.rowSpan = oiSpan > 0 ? oiSpan : 1;
            });

            return hierarchy;
        };

        // --- Main Component ---
        function App() {
            const [grade, setGrade] = useState('');
            const [subject, setSubject] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [toastMessage, setToastMessage] = useState('');
            const fileInputRef = useRef(null);

            const subjects = [
                { id: 'math', name: 'Math' },
                { id: 'cefl', name: 'Career Education and Financial Literacy' },
                { id: 'pew', name: 'Physical Education and Wellness' },
                { id: 'social-studies', name: 'Social Studies' }
            ];

            const grades = ['7', '8', '9'];

            // Fetch data when grade or subject changes
            useEffect(() => {
                if (!grade || !subject) {
                    setData(null);
                    setError(null);
                    return;
                }

                const filename = `${grade}_${subject}.csv`;
                setLoading(true);
                setError(null);
                setData(null);

                // Use a relative path or a known absolute path format
                // In a true production environment, these would be fetched from your server.
                // For this preview environment, we must catch the error gracefully and rely on the fallback.
                fetch(`./${filename}`)
                    .then(res => {
                        if (!res.ok) throw new Error('File not found');
                        return res.text();
                    })
                    .then(text => {
                        const parsed = parseCSV(text);
                        const hierarchy = buildHierarchy(parsed);
                        setData(hierarchy);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.warn("Fetch warning (expected in preview environment):", err);
                        // Fallback UI active if file isn't found locally (which is true in this iframe)
                        setError(`Could not automatically load "${filename}". Please use the upload button below to select the file from your device.`);
                        setLoading(false);
                    });
            }, [grade, subject]);

            // Handle manual file upload (Fallback)
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = parseCSV(event.target.result);
                        const hierarchy = buildHierarchy(parsed);
                        setData(hierarchy);
                        setLoading(false);
                    } catch (err) {
                        setError("Failed to parse the uploaded CSV file. Ensure it has the correct format.");
                        setLoading(false);
                    }
                };
                reader.onerror = () => {
                    setError("Error reading the file.");
                    setLoading(false);
                };
                reader.readAsText(file);
            };

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 3000);
            };

            const generateTSV = () => {
                if (!data) return "";
                let tsv = "Organizing Idea (OI)\tGuiding Question (GQ)\tLearning Outcome (LO)\n";

                data.forEach(oi => {
                    if (oi.gqs.length === 0) {
                        tsv += `${oi.code}: ${oi.text}\t\t\n`;
                    } else {
                        oi.gqs.forEach(gq => {
                            if (gq.los.length === 0) {
                                tsv += `${oi.code}: ${oi.text}\t${gq.code}: ${gq.text}\t\n`;
                            } else {
                                gq.los.forEach(lo => {
                                    tsv += `${oi.code}: ${oi.text}\t${gq.code}: ${gq.text}\t${lo.code}: ${lo.text}\n`;
                                });
                            }
                        });
                    }
                });
                return tsv;
            };

            const handleCopy = () => {
                const tsvContent = generateTSV();
                const textArea = document.createElement("textarea");
                textArea.value = tsvContent;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Content successfully copied to clipboard!");
                } catch (err) {
                    console.error('Failed to copy', err);
                    showToast("Failed to copy content.");
                }
                document.body.removeChild(textArea);
            };

            const handleExport = () => {
                if (!data) return;
                
                // Constructing CSV string for Excel Export
                let csvContent = "Organizing Idea (OI),Guiding Question (GQ),Learning Outcome (LO)\n";
                const escapeCsv = (str) => `"${str.replace(/"/g, '""')}"`;

                data.forEach(oi => {
                    const oiStr = escapeCsv(`${oi.code}: ${oi.text}`);
                    if (oi.gqs.length === 0) {
                        csvContent += `${oiStr},,\n`;
                    } else {
                        oi.gqs.forEach(gq => {
                            const gqStr = escapeCsv(`${gq.code}: ${gq.text}`);
                            if (gq.los.length === 0) {
                                csvContent += `${oiStr},${gqStr},\n`;
                            } else {
                                gq.los.forEach(lo => {
                                    const loStr = escapeCsv(`${lo.code}: ${lo.text}`);
                                    csvContent += `${oiStr},${gqStr},${loStr}\n`;
                                });
                            }
                        });
                    }
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Curriculum_${grade}_${subject}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <div className="mb-8 border-b pb-6">
                        <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-3">
                            <i className="fa-solid fa-layer-group text-blue-600"></i>
                            Curriculum Data Dashboard
                        </h1>
                        <p className="text-slate-500 mt-2">Select a grade and subject to view and export hierarchical curriculum elements.</p>
                    </div>

                    {/* Controls */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-6 items-end">
                        <div className="w-full md:w-1/3">
                            <label className="block text-sm font-medium text-slate-700 mb-2">Grade Level</label>
                            <select 
                                className="w-full border-slate-300 rounded-lg shadow-sm p-3 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50"
                                value={grade}
                                onChange={(e) => setGrade(e.target.value)}
                            >
                                <option value="">-- Select Grade --</option>
                                {grades.map(g => (
                                    <option key={g} value={g}>Grade {g}</option>
                                ))}
                            </select>
                        </div>
                        
                        <div className="w-full md:w-1/3">
                            <label className="block text-sm font-medium text-slate-700 mb-2">Subject</label>
                            <select 
                                className="w-full border-slate-300 rounded-lg shadow-sm p-3 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50"
                                value={subject}
                                onChange={(e) => setSubject(e.target.value)}
                            >
                                <option value="">-- Select Subject --</option>
                                {subjects.map(s => (
                                    <option key={s.id} value={s.id}>{s.name}</option>
                                ))}
                            </select>
                        </div>

                        {data && (
                            <div className="w-full md:w-1/3 flex gap-3 md:justify-end">
                                <button 
                                    onClick={handleCopy}
                                    className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-lg font-medium transition-colors shadow-sm"
                                >
                                    <i className="fa-regular fa-copy"></i> Copy
                                </button>
                                <button 
                                    onClick={handleExport}
                                    className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-lg font-medium transition-colors shadow-sm"
                                >
                                    <i className="fa-solid fa-file-excel"></i> Export CSV
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Loading State */}
                    {loading && (
                        <div className="flex flex-col items-center justify-center py-20 text-slate-500">
                            <i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                            <p className="text-lg font-medium">Processing File...</p>
                        </div>
                    )}

                    {/* Error / Fallback Uploader */}
                    {error && !loading && (
                        <div className="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center shadow-sm">
                            <div className="text-amber-600 text-4xl mb-3"><i className="fa-solid fa-triangle-exclamation"></i></div>
                            <h3 className="text-lg font-semibold text-amber-800 mb-2">File Not Found</h3>
                            <p className="text-amber-700 mb-6">{error}</p>
                            
                            <div className="inline-block relative">
                                <input 
                                    type="file" 
                                    accept=".csv" 
                                    ref={fileInputRef}
                                    onChange={handleFileUpload}
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2"
                                >
                                    <i className="fa-solid fa-upload"></i> Upload CSV Manually
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Empty State */}
                    {!grade && !subject && !data && !error && !loading && (
                        <div className="bg-white border border-slate-200 rounded-xl p-16 text-center shadow-sm">
                            <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400 text-3xl">
                                <i className="fa-solid fa-magnifying-glass"></i>
                            </div>
                            <h3 className="text-xl font-medium text-slate-700">No Data Selected</h3>
                            <p className="text-slate-500 mt-2">Please select a grade and subject from the dropdowns above to begin.</p>
                        </div>
                    )}

                    {/* Data Table */}
                    {data && !loading && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto table-container" style={{ maxHeight: 'calc(100vh - 350px)' }}>
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                    <thead className="bg-slate-50 sticky top-0 z-10 shadow-sm border-b border-slate-200">
                                        <tr>
                                            <th className="p-4 font-semibold text-slate-700 w-1/3 border-r border-slate-200">Organizing Idea (OI)</th>
                                            <th className="p-4 font-semibold text-slate-700 w-1/3 border-r border-slate-200">Guiding Question (GQ)</th>
                                            <th className="p-4 font-semibold text-slate-700 w-1/3">Learning Outcome (LO)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200 text-sm text-slate-700">
                                        {data.map(oi => (
                                            <Fragment key={oi.code}>
                                                {oi.gqs.length === 0 ? (
                                                    <tr className="hover:bg-slate-50/50">
                                                        <td className="p-4 border-r border-slate-200 align-top">
                                                            <span className="font-bold block mb-1 text-slate-900">{oi.code}</span>
                                                            {oi.text}
                                                        </td>
                                                        <td className="p-4 border-r border-slate-200 text-slate-400 italic">No Guiding Questions</td>
                                                        <td className="p-4 text-slate-400 italic">No Learning Outcomes</td>
                                                    </tr>
                                                ) : (
                                                    oi.gqs.map((gq, gqIndex) => (
                                                        <Fragment key={gq.code}>
                                                            {gq.los.length === 0 ? (
                                                                <tr className="hover:bg-slate-50/50">
                                                                    {gqIndex === 0 && (
                                                                        <td rowSpan={oi.rowSpan} className="p-4 border-r border-b border-slate-200 align-top bg-white">
                                                                            <span className="font-bold block mb-1 text-slate-900">{oi.code}</span>
                                                                            {oi.text}
                                                                        </td>
                                                                    )}
                                                                    <td className="p-4 border-r border-slate-200 align-top">
                                                                        <span className="font-semibold block mb-1 text-blue-800">{gq.code}</span>
                                                                        {gq.text}
                                                                    </td>
                                                                    <td className="p-4 text-slate-400 italic">No Learning Outcomes</td>
                                                                </tr>
                                                            ) : (
                                                                gq.los.map((lo, loIndex) => (
                                                                    <tr key={lo.code} className="hover:bg-blue-50/30 transition-colors">
                                                                        {gqIndex === 0 && loIndex === 0 && (
                                                                            <td rowSpan={oi.rowSpan} className="p-4 border-r border-b border-slate-200 align-top bg-white">
                                                                                <span className="font-bold block mb-1 text-slate-900">{oi.code}</span>
                                                                                {oi.text}
                                                                            </td>
                                                                        )}
                                                                        {loIndex === 0 && (
                                                                            <td rowSpan={gq.rowSpan} className="p-4 border-r border-b border-slate-200 align-top bg-white">
                                                                                <span className="font-semibold block mb-1 text-blue-800">{gq.code}</span>
                                                                                {gq.text}
                                                                            </td>
                                                                        )}
                                                                        <td className="p-4 border-b border-slate-100 align-top">
                                                                            <span className="font-medium block mb-1 text-emerald-700">{lo.code}</span>
                                                                            {lo.text}
                                                                        </td>
                                                                    </tr>
                                                                ))
                                                            )}
                                                        </Fragment>
                                                    ))
                                                )}
                                            </Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 animate-fade-in-up z-50">
                            <i className="fa-solid fa-circle-check text-green-400"></i>
                            {toastMessage}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
